<style>
  body.landing {
    overflow: hidden;
    height: 100dvh;
  }

  /* ─── Full-viewport scene background ─── */
  .landing-scene {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .landing-scene canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ─── Gradient veil: dark left → transparent right ─── */
  .landing-veil {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(
      to right,
      rgba(6,6,6,0.92) 0%,
      rgba(6,6,6,0.68) 30%,
      rgba(6,6,6,0.18) 55%,
      transparent 70%
    );
  }

  /* ─── Content layer ─── */
  .landing-content {
    position: relative;
    z-index: 2;
    height: 100dvh;
    pointer-events: none;
  }

  .landing-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 480px;
    height: 100%;
    padding: 48px 0 48px 64px;
    gap: 24px;
    pointer-events: auto;
  }

  /* ─── Text elements ─── */
  .landing-brand {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.3s;
  }

  .landing-brand img {
    width: 56px;
    height: 56px;
    filter: drop-shadow(0 0 24px var(--accent-glow));
  }

  .landing-brand h1 {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: clamp(2.5rem, 5vw, 4rem);
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 0 60px var(--accent-glow);
    line-height: 1;
  }

  .landing-brand h1 span {
    font-weight: 300;
    color: var(--text-muted);
  }

  .landing-tagline {
    font-family: var(--font-body);
    font-size: clamp(0.95rem, 1.5vw, 1.2rem);
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.5s;
  }

  .landing-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.7s;
  }

  .landing-status::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  .landing-cta {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    gap: 10px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--surface-border);
    border-radius: 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-family: var(--font-mono);
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.9s;
  }

  .landing-cta:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(42,107,69,0.5);
    color: var(--text);
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .landing-cta:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }

  .landing-cta svg {
    width: 16px;
    height: 16px;
    opacity: 0.6;
    flex-shrink: 0;
  }

  .landing-footer {
    margin-top: auto;
    font-size: 12px;
    color: rgba(255,255,255,0.15);
    font-family: var(--font-body);
    opacity: 0;
    animation: fadeSlideUp 0.6s ease forwards 1.1s;
  }

  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (prefers-reduced-motion: reduce) {
    .landing-brand,
    .landing-tagline,
    .landing-status,
    .landing-cta,
    .landing-footer {
      animation: none;
      opacity: 1;
    }

    .landing-status::before {
      animation: none;
    }
  }

  /* ─── Mobile: centered text, uniform dark overlay ─── */
  @media (max-width: 768px) {
    .landing-veil {
      background: linear-gradient(
        to bottom,
        rgba(6,6,6,0.92) 0%,
        rgba(6,6,6,0.75) 30%,
        rgba(6,6,6,0.40) 48%,
        rgba(6,6,6,0.12) 62%,
        transparent 80%
      );
    }

    .landing-text {
      max-width: 100%;
      padding: 32px 24px;
      align-items: center;
      text-align: center;
      gap: 20px;
      justify-content: flex-start;
      padding-top: 15vh;
    }

    .landing-brand {
      align-items: center;
    }

    .landing-brand h1 {
      font-size: clamp(2rem, 8vw, 2.8rem);
    }

    .landing-tagline {
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    }

    .landing-cta {
      align-self: center;
      font-size: 14px;
      padding: 14px 28px;
    }

    .landing-footer {
      text-align: center;
    }

    .landing-brand img {
      width: 44px;
      height: 44px;
    }
  }

  /* ─── Small phones ─── */
  @media (max-width: 375px) {
    .landing-text {
      padding: 24px 16px;
      padding-top: 12vh;
    }

    .landing-brand img {
      width: 36px;
      height: 36px;
    }

    .landing-brand h1 {
      font-size: clamp(1.8rem, 8vw, 2.5rem);
    }

    .landing-tagline {
      font-size: 0.85rem;
    }

    .landing-cta {
      padding: 12px 24px;
    }

    .landing-footer {
      font-size: 11px;
    }
  }
</style>
</head>

      tomer@unify-labs.dev
    </a>
    <footer class="landing-footer">&copy; 2026 Unify Labs</footer>
  </div>
</main>
