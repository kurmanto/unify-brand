<style>
  body.landing {
    overflow: hidden;
    height: 100dvh;
  }

  .landing-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    text-align: center;
    pointer-events: none;
    gap: 24px;
    padding: 24px;
  }

  .landing-content > * {
    pointer-events: auto;
  }

  .landing-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.3s;
  }

  .landing-brand img {
    width: 56px;
    height: 56px;
    filter: drop-shadow(0 0 24px var(--accent-glow));
  }

  .landing-brand h1 {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 0 60px var(--accent-glow);
    line-height: 1;
  }

  .landing-brand h1 span {
    font-weight: 300;
    color: var(--text-muted);
  }

  .landing-tagline {
    font-family: var(--font-body);
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.5s;
  }

  .landing-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.7s;
  }

  .landing-status::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  .landing-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--surface-border);
    border-radius: 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-family: var(--font-mono);
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards 0.9s;
  }

  .landing-cta:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(42,107,69,0.5);
    color: var(--text);
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .landing-cta:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }

  .landing-cta svg {
    width: 16px;
    height: 16px;
    opacity: 0.6;
    flex-shrink: 0;
  }

  .landing-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    padding: 16px 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.15);
    font-family: var(--font-body);
    pointer-events: none;
    opacity: 0;
    animation: fadeSlideUp 0.6s ease forwards 1.1s;
  }

  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (prefers-reduced-motion: reduce) {
    .landing-brand,
    .landing-tagline,
    .landing-status,
    .landing-cta,
    .landing-footer {
      animation: none;
      opacity: 1;
    }

    .landing-status::before {
      animation: none;
    }
  }

  @media (max-width: 640px) {
    .landing-brand img {
      width: 44px;
      height: 44px;
    }

    .landing-cta {
      font-size: 13px;
      padding: 10px 20px;
    }
  }
</style>
</head>
<body class="landing">

<div id="bg-canvas"></div>

<main class="landing-content">
  <div class="landing-brand">
    <img src="assets/unify-logo-white.svg" alt="Unify Labs" width="56" height="56">
    <h1>unify <span>/ Labs</span></h1>
  </div>
  <p class="landing-tagline">Engineering software that matters</p>
  <div class="landing-status">Coming Soon</div>
  <a class="landing-cta" href="mailto:hello@unify-labs.dev">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
    hello@unify-labs.dev
  </a>
</main>

<footer class="landing-footer">&copy; 2026 Unify Labs</footer>

<script type="module">
  import { initHero } from './js/hero-scene.js';
  initHero(document.getElementById('bg-canvas'));
</script>
</body>
</html>
