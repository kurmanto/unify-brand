<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logo Export</title>
  <style>
    body { margin: 0; padding: 40px; background: #f0f0f0; }
    .export { display: inline-block; margin: 20px; }
    .label { font-family: monospace; font-size: 11px; color: #999; margin-bottom: 8px; }
  </style>
</head>
<body>

  <!-- 52x52 main logo mark -->
  <div class="export">
    <div class="label">52x52 — main mark</div>
    <div id="logo-52" style="width: 52px; height: 52px; border-radius: 13px; overflow: hidden; background: linear-gradient(145deg, #6d1f3e, #b83a48, #e07a4b); display: flex; align-items: center; justify-content: center;">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <circle cx="11" cy="8" r="3" fill="rgba(255,255,255,0.4)"/>
        <line x1="11" y1="11" x2="11" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M11 22 Q11 30 22 33" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="33" cy="8" r="3" fill="white"/>
        <line x1="33" y1="11" x2="33" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M33 22 Q33 30 22 33" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="22" cy="36" r="3.5" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- 26x26 lockup mark -->
  <div class="export">
    <div class="label">26x26 — lockup mark</div>
    <div id="logo-26" style="width: 26px; height: 26px; border-radius: 6px; overflow: hidden; background: linear-gradient(145deg, #6d1f3e, #b83a48, #e07a4b); display: flex; align-items: center; justify-content: center;">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
        <circle cx="11" cy="8" r="4" fill="rgba(255,255,255,0.4)"/>
        <line x1="11" y1="12" x2="11" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M11 22 Q11 30 22 33" stroke="rgba(255,255,255,0.4)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="33" cy="8" r="4" fill="white"/>
        <line x1="33" y1="12" x2="33" y2="22" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M33 22 Q33 30 22 33" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="22" cy="36" r="4.5" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- 104x104 high-res for retina (2x of 52) -->
  <div class="export">
    <div class="label">104x104 — retina mark</div>
    <div id="logo-104" style="width: 104px; height: 104px; border-radius: 26px; overflow: hidden; background: linear-gradient(145deg, #6d1f3e, #b83a48, #e07a4b); display: flex; align-items: center; justify-content: center;">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
        <circle cx="11" cy="8" r="3" fill="rgba(255,255,255,0.4)"/>
        <line x1="11" y1="11" x2="11" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M11 22 Q11 30 22 33" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="33" cy="8" r="3" fill="white"/>
        <line x1="33" y1="11" x2="33" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M33 22 Q33 30 22 33" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="22" cy="36" r="3.5" fill="white"/>
      </svg>
    </div>
  </div>

</body>
</html>
