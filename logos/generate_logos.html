<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Logo PNGs</title>
  <style>
    body { font-family: monospace; padding: 40px; background: #f5f5f5; }
    canvas { border: 1px solid #ddd; margin: 10px; background: white; }
    .download-links { margin-top: 20px; }
    a { display: block; margin: 8px 0; color: #b83a48; }
    img { margin: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h3>Logo PNG Generator</h3>
  <div id="canvases"></div>
  <div id="previews"></div>
  <div id="links" class="download-links"></div>

  <script>
    function drawMergeMark(ctx, size, cornerRadius) {
      const s = size;

      // Draw rounded rectangle with gradient background
      const grad = ctx.createLinearGradient(0, 0, s * 0.6, s);
      grad.addColorStop(0, '#6d1f3e');
      grad.addColorStop(0.5, '#b83a48');
      grad.addColorStop(1, '#e07a4b');

      ctx.beginPath();
      ctx.roundRect(0, 0, s, s, cornerRadius);
      ctx.fillStyle = grad;
      ctx.fill();

      // Scale factor for the merge icon within the box
      const iconScale = s / 52;
      const cx = s / 2;
      const cy = s / 2;

      // Translate to center the 44x44 viewBox in the 52x52 box
      const offsetX = (s - 44 * iconScale * 0.54) / 2;
      const offsetY = (s - 44 * iconScale * 0.54) / 2;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(iconScale * 0.54, iconScale * 0.54);
      ctx.translate(-22, -22);

      // Left branch (semi-transparent)
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(11, 8, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(11, 11);
      ctx.lineTo(11, 22);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(11, 22);
      ctx.quadraticCurveTo(11, 30, 22, 33);
      ctx.stroke();

      // Right branch (opaque)
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(33, 8, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(33, 11);
      ctx.lineTo(33, 22);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(33, 22);
      ctx.quadraticCurveTo(33, 30, 22, 33);
      ctx.stroke();

      // Merge point
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(22, 36, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    const sizes = [
      { name: 'unify-logo-52', size: 52, radius: 13, desc: 'Main mark (52px)' },
      { name: 'unify-logo-26', size: 26, radius: 6, desc: 'Lockup mark (26px)' },
      { name: 'unify-logo-104', size: 104, radius: 26, desc: 'Retina mark (104px, use at 52px)' },
      { name: 'unify-logo-52-lockup', size: 52, radius: 12, desc: 'Retina lockup (52px, use at 26px)' },
    ];

    const linksDiv = document.getElementById('links');
    const previewsDiv = document.getElementById('previews');

    sizes.forEach(({ name, size, radius, desc }) => {
      // Use 2x resolution for crisp output
      const dpr = 2;
      const canvas = document.createElement('canvas');
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      drawMergeMark(ctx, size, radius);

      document.getElementById('canvases').appendChild(canvas);

      // Create download link
      const dataUrl = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = name + '.png';
      link.textContent = `Download ${desc}: ${name}.png`;
      linksDiv.appendChild(link);

      // Show preview
      const img = document.createElement('img');
      img.src = dataUrl;
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      img.title = desc;
      previewsDiv.appendChild(img);
    });
  </script>
</body>
</html>
