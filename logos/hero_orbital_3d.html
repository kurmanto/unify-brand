    font-family: 'Inter', -apple-system, sans-serif;
    background: #060606;
    color: #fafafa;
  }

  /* Hero section */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }
  .hero canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 15vh;
    pointer-events: none;
    z-index: 10;
  }
  .overlay-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 8vw, 6rem);
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .overlay-tag {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: clamp(0.7rem, 1.2vw, 1rem);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.6rem;
  }
  .palette-label {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    z-index: 11;
    pointer-events: none;

  .palette-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 16px;
    color: rgba(255,255,255,0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .palette-toggle:hover {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
  }

    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 32px;

    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 24px;
    padding: 0 8px;
  }
  .comparison-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    border-radius: 20px;
    overflow: hidden;
  }
  .comp-cell {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 16px;
  }
  .comp-cell-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #444;
  }
  .mark {
    width: 80px; height: 80px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mark svg { width: 44px; height: 44px; }
  .g1 { background: linear-gradient(145deg, #1b3d2c, #2a6b45, #348a58); }
  .g2 { background: linear-gradient(145deg, #6d1f3e, #b83a48, #e07a4b); }

    align-items: center;
    gap: 20px;
    margin-top: 8px;

  .mark-32 { width: 32px; height: 32px; border-radius: 8px; }

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ─── Simplex 3D noise GLSL — Ashima Arts ─────────────────────────────
const noiseGLSL = `
  vec4 permute(vec4 x){ return mod(((x*34.0)+1.0)*x, 289.0); }
  vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v){
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod(i, 289.0);
    vec4 p = permute(permute(permute(
      i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 1.0/7.0;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }
`;

// ─── Hash GLSL — used by star shaders ────────────────────────────────
const hashGLSL = `
  float hash(float n) { return fract(sin(n) * 43758.5453123); }
  float hash2(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
`;

// ─── Star Helper Functions ───────────────────────────────────────────

// Kelvin → [r,g,b] via Tanner Helland algorithm (attempt at init, not per-frame)
function blackbodyColor(tempK) {
  const t = tempK / 100.0;
  let r, g, b;
  if (t <= 66) {
    r = 255;
    g = 99.4708025861 * Math.log(t) - 161.1195681661;
    b = t <= 19 ? 0 : 138.5177312231 * Math.log(t - 10) - 305.0447927307;
  } else {
    r = 329.698727446 * Math.pow(t - 60, -0.1332047592);
    g = 288.1221695283 * Math.pow(t - 60, -0.0755148492);
    b = 255;
  }
  return [
    Math.min(Math.max(r, 0), 255) / 255,
    Math.min(Math.max(g, 0), 255) / 255,
    Math.min(Math.max(b, 0), 255) / 255,
  ];
}

// Returns 0-1 with power-law distribution (higher exp = more dim stars)
function powerLawBrightness(exp) {
  return Math.pow(Math.random(), exp);
}

// Weighted random star temperature in Kelvin
function randomStarTemperature() {
  const roll = Math.random();
  if (roll < 0.05) return 20000 + Math.random() * 15000;       // 5% hot blue-white
  if (roll < 0.15) return 8000 + Math.random() * 4000;         // 10% white
  if (roll < 0.45) return 5000 + Math.random() * 1500;         // 30% yellow (sun-like)
  if (roll < 0.80) return 3500 + Math.random() * 1500;         // 35% orange
  return 2500 + Math.random() * 1000;                          // 20% red dwarf
}

// Blend blackbody color toward palette starTint
function tintStarColor(bb, tint, amt) {
  return [
    bb[0] * (1 - amt) + tint.r * amt,
    bb[1] * (1 - amt) + tint.g * amt,
    bb[2] * (1 - amt) + tint.b * amt,
  ];
}

// ─── Palettes ─────────────────────────────────────────────────────────
const palettes = {
  deepGreen: {
    color0: new THREE.Vector3(1.0, 0.97, 0.92),      // Cream white — hot core highlights
    color1: new THREE.Vector3(0.6, 0.95, 0.7),        // Mint / light green — light accent
    color2: new THREE.Vector3(0.16, 0.55, 0.35),      // Emerald — primary brand
    color3: new THREE.Vector3(0.15, 0.65, 0.6),       // Teal / cyan — cool accent
    color4: new THREE.Vector3(0.08, 0.3, 0.15),       // Deep forest — dark depth
    glowColor:    new THREE.Color(0.3, 0.8, 0.45),
    sparkColor:   new THREE.Color(0.4, 1.0, 0.55),
    ringColor:    new THREE.Vector3(0.5, 1.0, 0.7),
    ambientColor: 0x88ccaa,
    nebulaColor1: new THREE.Color(0.1, 0.4, 0.25),
    nebulaColor2: new THREE.Color(0.08, 0.25, 0.35),
    starTint:     new THREE.Color(0.7, 1.0, 0.85),
    meteorColor:  new THREE.Color(0.5, 1.0, 0.7),
    galaxyCore:   new THREE.Color(0.15, 0.5, 0.3),
    galaxyArm1:   new THREE.Color(0.08, 0.35, 0.2),
    galaxyArm2:   new THREE.Color(0.05, 0.2, 0.3),
    nebulaVivid1: new THREE.Color(0.05, 0.85, 0.70),  // Electric cyan-teal
    nebulaVivid2: new THREE.Color(0.10, 0.70, 0.95),  // Vivid cerulean-blue
    nebulaVivid3: new THREE.Color(0.20, 0.95, 0.40),  // Neon emerald-chartreuse
    nebulaVivid4: new THREE.Color(0.02, 0.45, 0.55),  // Deep ocean teal (dust lanes)
  },
  warmSunset: {
    color0: new THREE.Vector3(1.0, 0.95, 0.85),       // Warm cream — hot core
    color1: new THREE.Vector3(1.0, 0.78, 0.35),       // Golden yellow — bright accent
    color2: new THREE.Vector3(0.88, 0.48, 0.29),      // Warm orange — primary brand
    color3: new THREE.Vector3(0.85, 0.3, 0.35),       // Rose / coral — warm accent
    color4: new THREE.Vector3(0.55, 0.15, 0.3),       // Deep magenta — dark depth
    glowColor:    new THREE.Color(0.9, 0.45, 0.3),
    sparkColor:   new THREE.Color(1.0, 0.65, 0.35),
    ringColor:    new THREE.Vector3(1.0, 0.7, 0.45),
    ambientColor: 0xcc9977,
    nebulaColor1: new THREE.Color(0.4, 0.15, 0.1),
    nebulaColor2: new THREE.Color(0.35, 0.2, 0.05),
    starTint:     new THREE.Color(1.0, 0.9, 0.75),
    meteorColor:  new THREE.Color(1.0, 0.7, 0.4),
    galaxyCore:   new THREE.Color(0.5, 0.25, 0.15),
    galaxyArm1:   new THREE.Color(0.4, 0.15, 0.1),
    galaxyArm2:   new THREE.Color(0.3, 0.1, 0.2),
    nebulaVivid1: new THREE.Color(0.95, 0.15, 0.35),  // Vivid crimson-magenta
    nebulaVivid2: new THREE.Color(0.85, 0.10, 0.60),  // Deep rose-magenta
    nebulaVivid3: new THREE.Color(1.00, 0.65, 0.10),  // Amber-gold emission
    nebulaVivid4: new THREE.Color(0.30, 0.05, 0.15),  // Dark wine-burgundy (dust lanes)
  },
};

// ─── Reusable Scene Factory ──────────────────────────────────────────
const scenes = []; // track all scene instances for animation

function createScene(container, palette) {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 0.3, 5.5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x060606);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  container.prepend(renderer.domElement);

  // Post-processing
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    0.55, 0.4, 0.75
  );
  composer.addPass(bloomPass);

  // Chromatic aberration pass — subtle prismatic fringing
  const chromaticShader = {
    uniforms: {
      tDiffuse: { value: null },
      uIntensity: { value: 0.003 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform float uIntensity;
      varying vec2 vUv;
      void main() {
        vec2 center = vec2(0.5);
        vec2 dir = vUv - center;
        float dist = length(dir);
        float offset = dist * uIntensity;
        vec2 shift = normalize(dir + 0.0001) * offset;
        float r = texture2D(tDiffuse, vUv + shift).r;
        float g = texture2D(tDiffuse, vUv).g;
        float b = texture2D(tDiffuse, vUv - shift).b;
        float a = texture2D(tDiffuse, vUv).a;
        gl_FragColor = vec4(r, g, b, a);
      }
    `,
  };
  const chromaticPass = new ShaderPass(chromaticShader);
  composer.addPass(chromaticPass);

  composer.addPass(new OutputPass());

  // Scene graph
  const atomGroup = new THREE.Group();
  scene.add(atomGroup);

  // ─── 1. Energy Sphere — FluidMetal-style displacement ────────────
  const energyMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor0: { value: palette.color0 },
      uColor1: { value: palette.color1 },
      uColor2: { value: palette.color2 },
      uColor3: { value: palette.color3 },
      uColor4: { value: palette.color4 },
    },
    vertexShader: `
      ${noiseGLSL}
      uniform float uTime;
      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec3 vWorldPos;
      varying float vDisplacement;

      void main() {
        vec3 pos = position;
        // Lower frequency → broader, more geometric undulations
        float slow = uTime * 0.35;
        float n = snoise(pos * 1.4 + slow) * 0.15;
        n += snoise(pos * 2.8 + uTime * 0.5) * 0.05;
        float displacement = n;
        vDisplacement = displacement;

        vec3 displaced = pos + normal * displacement;
        vPosition = (modelMatrix * vec4(displaced, 1.0)).xyz;
        vWorldPos = displaced;
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
      }
    `,
    fragmentShader: `
      ${noiseGLSL}
      uniform float uTime;
      uniform vec3 uColor0;
      uniform vec3 uColor1;
      uniform vec3 uColor2;
      uniform vec3 uColor3;
      uniform vec3 uColor4;
      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec3 vWorldPos;
      varying float vDisplacement;

      void main() {
        vec3 viewDir = normalize(cameraPosition - vPosition);
        float fresnel = pow(1.0 - abs(dot(viewDir, normalize(vNormal))), 2.5);

        // Noise-driven color region
        float n1 = snoise(vWorldPos * 1.8 + uTime * 0.3) * 0.5 + 0.5;
        float n2 = snoise(vWorldPos * 3.5 + uTime * 0.5) * 0.3;

        float colorParam = clamp(n1 + n2 * fresnel, 0.0, 1.0);

        // 5-stop gradient blend
        vec3 color;
        if (colorParam < 0.25) {
          color = mix(uColor0, uColor1, colorParam / 0.25);
        } else if (colorParam < 0.5) {
          color = mix(uColor1, uColor2, (colorParam - 0.25) / 0.25);
        } else if (colorParam < 0.75) {
          color = mix(uColor2, uColor3, (colorParam - 0.5) / 0.25);
        } else {
          color = mix(uColor3, uColor4, (colorParam - 0.75) / 0.25);
        }

        // Fresnel pushes edges toward brighter/lighter colors
        color = mix(color, uColor0, fresnel * 0.4);

        // Reduced intensity
        float pulse = 0.85 + 0.15 * sin(uTime * 0.8);
        float intensity = (1.2 + fresnel * 1.5) * pulse;

        gl_FragColor = vec4(color * intensity, 0.9 + fresnel * 0.1);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    toneMapped: false,
  });

  const energySphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 48, 48),
    energyMat
  );
  atomGroup.add(energySphere);

  // ─── 2. Outer Glow Halo ──────────────────────────────────────────
  const outerGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 32, 32),
    new THREE.MeshBasicMaterial({
      color: palette.glowColor,
      transparent: true,
      opacity: 0.04,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      depthWrite: false,
    })
  );
  atomGroup.add(outerGlow);

  // ─── 3. Spark Particles (polished ShaderMaterial) ──────────────
  const SPARK_COUNT = 100;
  const sparkPositions = new Float32Array(SPARK_COUNT * 3);
  const sparkColors = new Float32Array(SPARK_COUNT * 3);
  const sparkSizes = new Float32Array(SPARK_COUNT);
  const sparkOpacities = new Float32Array(SPARK_COUNT);
  const sparkVelocities = [];
  const sparkLifetimes = new Float32Array(SPARK_COUNT);
  const sparkMaxLifetimes = new Float32Array(SPARK_COUNT);

  const sc = palette.sparkColor;
  for (let i = 0; i < SPARK_COUNT; i++) {
    sparkMaxLifetimes[i] = 0.8 + Math.random() * 1.7;
    sparkLifetimes[i] = Math.random() * sparkMaxLifetimes[i];
    sparkSizes[i] = 0.012 + Math.random() * 0.016;
    sparkOpacities[i] = 1.0;

    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const speed = 0.2 + Math.random() * 0.6;
    sparkVelocities.push(new THREE.Vector3(
      Math.sin(phi) * Math.cos(theta) * speed,
      Math.sin(phi) * Math.sin(theta) * speed,
      Math.cos(phi) * speed
    ));

    const brightness = 0.8 + Math.random() * 1.0;
    sparkColors[i * 3]     = sc.r * brightness;
    sparkColors[i * 3 + 1] = sc.g * brightness;
    sparkColors[i * 3 + 2] = sc.b * brightness;
  }

  const sparkGeo = new THREE.BufferGeometry();
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPositions, 3));
  sparkGeo.setAttribute('color', new THREE.BufferAttribute(sparkColors, 3));
  sparkGeo.setAttribute('aSize', new THREE.BufferAttribute(sparkSizes, 1));
  sparkGeo.setAttribute('aOpacity', new THREE.BufferAttribute(sparkOpacities, 1));

  const sparkMat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float aSize;
      attribute float aOpacity;
      varying vec3 vColor;
      varying float vOpacity;
      void main() {
        vColor = color;
        vOpacity = aOpacity;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * (300.0 / -mvPos.z);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vOpacity;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if (d > 0.5) discard;
        float falloff = 1.0 - smoothstep(0.0, 0.5, d);
        gl_FragColor = vec4(vColor * falloff, vOpacity * falloff);
      }
    `,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false,
  });

  const sparkPoints = new THREE.Points(sparkGeo, sparkMat);
  atomGroup.add(sparkPoints);

  // ─── 4. Orbit Rings — Rebalanced + Flowing Energy Pulse ─────────
  const ringDefs = [
    { rx: 2.0, ry: 0.7,  rotZ: -20 * Math.PI / 180, baseOpacity: 0.6,  tube: 0.012, phase: 0.0 },
    { rx: 2.0, ry: 0.85, rotZ:  15 * Math.PI / 180, baseOpacity: 0.35, tube: 0.010, phase: 2.1 },
    { rx: 2.0, ry: 0.9,  rotZ:  50 * Math.PI / 180, baseOpacity: 0.2,  tube: 0.010, phase: 4.2 },
  ];

  const ringCurves = [];
  const ringMeshes = [];
  const ringMaterials = [];

  for (const def of ringDefs) {
    const ellipse = new THREE.EllipseCurve(0, 0, def.rx, def.ry, 0, Math.PI * 2, false, 0);
    const pts2d = ellipse.getPoints(128);
    const pts3d = pts2d.map(p => new THREE.Vector3(p.x, 0, p.y));
    const curve = new THREE.CatmullRomCurve3(pts3d, true);
    ringCurves.push(curve);

    const tubeGeo = new THREE.TubeGeometry(curve, 128, def.tube, 8, true);

    // Custom ShaderMaterial for flowing energy pulse
    const ringMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uBaseOpacity: { value: def.baseOpacity },
        uRingColor: { value: palette.ringColor },
        uPhase: { value: def.phase },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform float uBaseOpacity;
        uniform vec3 uRingColor;
        uniform float uPhase;
        varying vec2 vUv;

        void main() {
          float t = vUv.x; // lengthwise parameter 0..1

          // 2-3 bright pulses traveling along the ring at different speeds
          float pulse1 = pow(max(sin((t - uTime * 0.3 + uPhase) * 6.2831853 * 2.0), 0.0), 6.0);
          float pulse2 = pow(max(sin((t - uTime * 0.2 + uPhase * 0.7) * 6.2831853 * 3.0), 0.0), 6.0);
          float pulse3 = pow(max(sin((t + uTime * 0.15 + uPhase * 1.3) * 6.2831853 * 1.0), 0.0), 12.0);

          float brightness = uBaseOpacity + 0.25 * pulse1 + 0.15 * pulse2 + 0.1 * pulse3;

          // Mix white core with palette ring color
          vec3 color = mix(vec3(1.0), uRingColor, 0.2 + 0.15 * (pulse1 + pulse2));

          gl_FragColor = vec4(color * brightness, brightness);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      toneMapped: false,
    });

    const mesh = new THREE.Mesh(tubeGeo, ringMat);
    mesh.rotation.z = def.rotZ;
    mesh.userData.baseRotZ = def.rotZ;
    mesh.userData.phase = def.phase;
    atomGroup.add(mesh);
    ringMeshes.push(mesh);
    ringMaterials.push(ringMat);
  }

  // ─── 5. Orbit Particles (electrons) ──────────────────────────────
  const PARTICLES_PER_RING = 4;
  const orbitParticleGroups = [];

  for (let ri = 0; ri < ringDefs.length; ri++) {
    const count = PARTICLES_PER_RING;
    const posArr = new Float32Array(count * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));

    const mat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.04,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
      sizeAttenuation: true,
    });
    const points = new THREE.Points(geo, mat);
    points.rotation.z = ringDefs[ri].rotZ;
    points.userData.baseRotZ = ringDefs[ri].rotZ;
    points.userData.phase = ringDefs[ri].phase;
    atomGroup.add(points);

    const phases = [];
    for (let i = 0; i < count; i++) {
      phases.push(i / count);
    }
    const speed = 0.15 + ri * 0.02;

    orbitParticleGroups.push({ points, curve: ringCurves[ri], phases, speed, posArr });
  }

  // ─── 6. Cosmic Space Background ──────────────────────────────────

  // ─── Star field — shared spiral arm helper ────────────────────────
  const gCenterX = -0.15 * 20; // galaxy center in world space
  const gCenterY = 0.1 * 20;
  const spiralTightness = 0.5;

  function spiralArmBias(x, y) {
    const dx = x - gCenterX, dy = y - gCenterY;
    const r = Math.sqrt(dx * dx + dy * dy) / 20;
    const theta = Math.atan2(dy, dx);
    return Math.cos((theta - Math.log(r + 0.001) / spiralTightness) * 2.0);
  }

  function placeStar(spread, useSpiralBias, useCenterBias) {
    let x, y;
    if (useSpiralBias) {
      let attempts = 0;
      do {
        x = (Math.random() - 0.5) * spread;
        y = (Math.random() - 0.5) * spread;
        if (spiralArmBias(x, y) > 0.3 || attempts >= 5) break;
        attempts++;
      } while (true);
    } else {
      x = (Math.random() - 0.5) * spread;
      y = (Math.random() - 0.5) * spread;
    }
    if (useCenterBias) {
      // Bias toward galaxy center
      const bias = 0.3;
      x = x * (1 - bias) + gCenterX * bias + (Math.random() - 0.5) * 2;
      y = y * (1 - bias) + gCenterY * bias + (Math.random() - 0.5) * 2;
    }
    return [x, y];
  }

  // ─── Layer 1: Background Stars — 6,000 dim stars ──────────────────
  function createBackgroundStars(palette) {
    const count = 6000;
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const phases = new Float32Array(count);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
      const [x, y] = placeStar(20, false, false);
      positions[i * 3]     = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = -12 + Math.random() * 8; // -12 to -4

      const brightness = powerLawBrightness(3.5);
      const brightnessScale = 0.4 + brightness * 0.6;
      sizes[i] = (0.03 + Math.random() * 0.08) * brightnessScale;
      phases[i] = Math.random() * 43758.0; // large range for hash diversity

      const temp = randomStarTemperature();
      const bb = blackbodyColor(temp);
      const tinted = tintStarColor(bb, palette.starTint, 0.2);
      colors[i * 3]     = tinted[0] * brightnessScale;
      colors[i * 3 + 1] = tinted[1] * brightnessScale;
      colors[i * 3 + 2] = tinted[2] * brightnessScale;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float aSize;
        attribute float aPhase;
        varying float vPhase;
        varying vec3 vColor;
        void main() {
          vPhase = aPhase;
          vColor = color;
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = max(aSize * (600.0 / -mvPos.z), 1.0);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        ${hashGLSL}
        uniform float uTime;
        varying float vPhase;
        varying vec3 vColor;
        void main() {
          float d = length(gl_PointCoord - vec2(0.5));
          if (d > 0.5) discard;
          float falloff = 1.0 - smoothstep(0.0, 0.5, d);
          // Slow breathing — stars gently pulse
          float breath = 0.75 + 0.25 * sin(uTime * 0.3 + vPhase * 6.2831853);
          float alpha = breath * falloff * 1.1;
          gl_FragColor = vec4(vColor * breath * 1.5, alpha);
        }
      `,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
    });

    const points = new THREE.Points(geo, mat);
    points.userData.rotSpeed = 0.003;
    scene.add(points);
    return { points, mat };
  }

  // ─── Layer 2: Mid-field Stars — 2,500 with scintillation ──────────
  function createMidFieldStars(palette) {
    const count = 2500;
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const phases = new Float32Array(count);
    const colors = new Float32Array(count * 3);
    const brightnesses = new Float32Array(count);

    for (let i = 0; i < count; i++) {
      const [x, y] = placeStar(20, false, false);
      positions[i * 3]     = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = -12 + Math.random() * 10; // -12 to -2

      const brightness = powerLawBrightness(2.5);
      brightnesses[i] = 0.3 + brightness * 0.7; // floor of 0.3
      sizes[i] = (0.04 + Math.random() * 0.10) * (0.5 + brightness * 0.5);
      phases[i] = Math.random() * Math.PI * 2;

      const temp = randomStarTemperature();
      const bb = blackbodyColor(temp);
      const tinted = tintStarColor(bb, palette.starTint, 0.15);
      colors[i * 3]     = tinted[0];
      colors[i * 3 + 1] = tinted[1];
      colors[i * 3 + 2] = tinted[2];
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('aBrightness', new THREE.BufferAttribute(brightnesses, 1));

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float aSize;
        attribute float aPhase;
        attribute float aBrightness;
        varying float vPhase;
        varying vec3 vColor;
        varying float vBrightness;
        void main() {
          vPhase = aPhase;
          vColor = color;
          vBrightness = aBrightness;
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = max(aSize * (500.0 / -mvPos.z), 1.2);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        varying float vPhase;
        varying vec3 vColor;
        varying float vBrightness;
        void main() {
          float d = length(gl_PointCoord - vec2(0.5));
          if (d > 0.5) discard;
          float falloff = 1.0 - smoothstep(0.0, 0.5, d);

          // Slow breathing — stars gently pulse
          float t1 = sin(uTime * 0.3 + vPhase * 6.2831853);
          float t2 = sin(uTime * 0.5 + vPhase * 4.1234567);
          float twinkle = 0.7 + 0.3 * ((t1 + t2) / 2.0 * 0.5 + 0.5);

          // Brightness-scaled twinkle amount
          twinkle = mix(0.8, twinkle, 0.3 + vBrightness * 0.7);

          // Minimal chromatic shimmer
          float chromaShift = 0.01 * vBrightness * sin(uTime * 0.3 + vPhase);
          vec3 color = vColor;
          color.r += chromaShift;
          color.b -= chromaShift;

          float alpha = vBrightness * twinkle * falloff * 1.2;
          gl_FragColor = vec4(color * twinkle * 1.2, alpha);
        }
      `,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
    });

    const points = new THREE.Points(geo, mat);
    points.userData.rotSpeed = 0.008;
    scene.add(points);
    return { points, mat };
  }

  // ─── Layer 3: Feature Stars — 200 bright stars with glow + flares ─
  function createFeatureStars(palette) {
    const count = 200;
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const phases = new Float32Array(count);
    const colors = new Float32Array(count * 3);
    const brightnesses = new Float32Array(count);

    for (let i = 0; i < count; i++) {
      // Uniform spread — "nearby" bright stars, no arm clustering
      const x = (Math.random() - 0.5) * 20;
      const y = (Math.random() - 0.5) * 20;
      positions[i * 3]     = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = -8 + Math.random() * 8; // -8 to 0

      const brightness = powerLawBrightness(1.5);
      brightnesses[i] = 0.4 + brightness * 0.6; // floor of 0.4
      sizes[i] = (0.06 + Math.random() * 0.14) * (0.5 + brightness * 0.5);
      phases[i] = Math.random() * Math.PI * 2;

      const temp = randomStarTemperature();
      const bb = blackbodyColor(temp);
      const tinted = tintStarColor(bb, palette.starTint, 0.12);
      colors[i * 3]     = tinted[0];
      colors[i * 3 + 1] = tinted[1];
      colors[i * 3 + 2] = tinted[2];
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('aBrightness', new THREE.BufferAttribute(brightnesses, 1));

    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uFlareIntensity: { value: 0 },
        uFlareSeed: { value: 0 },
      },
      vertexShader: `
        attribute float aSize;
        attribute float aPhase;
        attribute float aBrightness;
        varying float vPhase;
        varying vec3 vColor;
        varying float vBrightness;
        void main() {
          vPhase = aPhase;
          vColor = color;
          vBrightness = aBrightness;
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = max(aSize * (450.0 / -mvPos.z), 2.0);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        ${hashGLSL}
        uniform float uTime;
        uniform float uFlareIntensity;
        uniform float uFlareSeed;
        varying float vPhase;
        varying vec3 vColor;
        varying float vBrightness;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);
          if (d > 0.5) discard;

          // Two-component glow profile
          float core = exp(-d * d * 80.0);           // sharp bright center
          float halo = 0.02 / (d * d + 0.01);        // soft extended glow
          float shape = core + halo * vBrightness;

          // Slow breathing — stars gently pulse
          float t1 = sin(uTime * 0.3 + vPhase * 6.2831853);
          float t2 = sin(uTime * 0.5 + vPhase * 4.1234567);
          float twinkle = 0.7 + 0.3 * ((t1 + t2) / 2.0 * 0.5 + 0.5);

          // Minimal chromatic shimmer
          float chromaShift = 0.02 * vBrightness * sin(uTime * 0.3 + vPhase);
          vec3 color = vColor;
          color.r += chromaShift;
          color.b -= chromaShift;

          // White-hot center blend
          color = mix(color, vec3(1.0), core * vBrightness * 0.6);

          // Flare system — hash-based star selection
          float flareMask = step(0.92, hash(vPhase * 100.0 + uFlareSeed));
          float flareBoost = 1.0 + uFlareIntensity * flareMask * 3.0;

          float alpha = vBrightness * twinkle * shape * flareBoost;
          gl_FragColor = vec4(color * twinkle * flareBoost, alpha);
        }
      `,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
    });

    const points = new THREE.Points(geo, mat);
    points.userData.rotSpeed = 0.012;
    scene.add(points);
    return { points, mat };
  }

  // ─── Background Galaxies — 20 procedural galaxy blobs ────────────
  function createBackgroundGalaxies(palette) {
    const count = 20;
    const positions = new Float32Array(count * 3);
    const aAxes = new Float32Array(count);      // axisRatio
    const aRotations = new Float32Array(count);  // rotation angle
    const aBrights = new Float32Array(count);    // brightness
    const aTypes = new Float32Array(count);      // 0=elliptical, 1=spiral
    const aSizes = new Float32Array(count);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
      // Scatter at z = -10 to -14, avoiding 3-unit radius around center
      let x, y;
      do {
        x = (Math.random() - 0.5) * 20;
        y = (Math.random() - 0.5) * 14;
      } while (Math.sqrt(x * x + y * y) < 3.0);
      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = -10 - Math.random() * 4;

      aAxes[i] = 0.3 + Math.random() * 0.7;     // edge-on to face-on
      aRotations[i] = Math.random() * Math.PI * 2;
      aBrights[i] = 0.06 + Math.random() * 0.10;
      aTypes[i] = Math.random() < 0.4 ? 1.0 : 0.0; // 40% spiral
      aSizes[i] = 0.4 + Math.random() * 0.5;

      // Color from palette
      const mix = Math.random();
      const gc = palette.galaxyCore, ga1 = palette.galaxyArm1, ga2 = palette.galaxyArm2;
      colors[i * 3]     = gc.r * (1 - mix) + ga1.r * mix;
      colors[i * 3 + 1] = gc.g * (1 - mix) + ga1.g * mix;
      colors[i * 3 + 2] = gc.b * (1 - mix) + ga2.b * mix;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aAxis', new THREE.BufferAttribute(aAxes, 1));
    geo.setAttribute('aRot', new THREE.BufferAttribute(aRotations, 1));
    geo.setAttribute('aBright', new THREE.BufferAttribute(aBrights, 1));
    geo.setAttribute('aType', new THREE.BufferAttribute(aTypes, 1));
    geo.setAttribute('aGalaxySize', new THREE.BufferAttribute(aSizes, 1));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float aAxis;
        attribute float aRot;
        attribute float aBright;
        attribute float aType;
        attribute float aGalaxySize;
        varying float vAxis;
        varying float vRot;
        varying float vBright;
        varying float vType;
        varying vec3 vColor;
        void main() {
          vAxis = aAxis;
          vRot = aRot;
          vBright = aBright;
          vType = aType;
          vColor = color;
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = max(aGalaxySize * (800.0 / -mvPos.z), 4.0);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        ${hashGLSL}
        uniform float uTime;
        varying float vAxis;
        varying float vRot;
        varying float vBright;
        varying float vType;
        varying vec3 vColor;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          // Rotate UV
          float c = cos(vRot), s = sin(vRot);
          vec2 ruv = vec2(uv.x * c - uv.y * s, uv.x * s + uv.y * c);
          // Stretch by axis ratio
          ruv.y /= max(vAxis, 0.3);
          float r = length(ruv);
          if (r > 0.5) discard;

          // Elliptical body glow
          float body = exp(-r * r * 25.0);

          // Optional spiral pattern for spiral type
          float spiral = 0.0;
          if (vType > 0.5) {
            float theta = atan(ruv.y, ruv.x);
            spiral = 0.3 * pow(max(cos(theta * 2.0 - r * 12.0 + uTime * 0.02), 0.0), 3.0);
            spiral *= smoothstep(0.0, 0.1, r) * smoothstep(0.45, 0.15, r);
          }

          // Hash noise irregularity
          float noise = hash2(ruv * 10.0 + 7.3) * 0.15;

          float brightness = (body + spiral + noise * body) * vBright;
          float alpha = brightness;
          gl_FragColor = vec4(vColor * brightness, alpha);
        }
      `,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);
    return { points, mat };
  }

  const starLayers = [
    createBackgroundStars(palette),
    createMidFieldStars(palette),
    createFeatureStars(palette),
  ];
  const bgGalaxies = createBackgroundGalaxies(palette);

  // ─── 6B. Spiral Galaxy Background Shader ────────────────────────
  const galaxyMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uGalaxyCore: { value: palette.galaxyCore },
      uGalaxyArm1: { value: palette.galaxyArm1 },
      uGalaxyArm2: { value: palette.galaxyArm2 },
      uGalaxyCenter: { value: new THREE.Vector2(-0.15, 0.1) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      ${noiseGLSL}
      uniform float uTime;
      uniform vec3 uGalaxyCore;
      uniform vec3 uGalaxyArm1;
      uniform vec3 uGalaxyArm2;
      uniform vec2 uGalaxyCenter;
      varying vec2 vUv;

      void main() {
        vec2 center = uGalaxyCenter;
        vec2 p = vUv - 0.5 - center;
        p *= 1.5;

        float r = length(p);
        float theta = atan(p.y, p.x);
        theta += uTime * 0.005; // slower rotation

        // --- Warped coordinates for organic feel ---
        float warp1 = snoise(vec3(p * 1.5, uTime * 0.004)) * 0.5;
        float warp2 = snoise(vec3(p * 3.0 + 7.0, uTime * 0.006)) * 0.25;
        float warpedTheta = theta + warp1 + warp2;

        // --- 3 asymmetric arms (different phases, widths, strengths) ---
        float arm1 = cos(warpedTheta * 2.0 - log(r + 0.001) * 2.0);
        float arm2 = cos(warpedTheta * 2.0 - log(r + 0.001) * 2.0 + 2.4) * 0.7;
        float arm3 = cos(warpedTheta * 2.0 - log(r + 0.001) * 2.0 + 4.2) * 0.4;
        float arms = max(max(arm1, arm2), arm3);
        arms = smoothstep(-0.3, 0.8, arms); // wider, softer falloff

        // --- Fade center convergence ---
        arms *= smoothstep(0.04, 0.18, r);

        // --- FBM detail wisps (independent of spiral) ---
        float fbm = snoise(vec3(p * 4.0, uTime * 0.003)) * 0.5
                   + snoise(vec3(p * 8.0 + 3.0, uTime * 0.005)) * 0.25
                   + snoise(vec3(p * 16.0 + 7.0, uTime * 0.007)) * 0.125;
        float wisps = smoothstep(-0.2, 0.6, fbm) * 0.4;

        // --- Noise breakup + dust lanes ---
        float breakup = snoise(vec3(p * 5.0 + 15.0, uTime * 0.004));
        arms *= 0.6 + 0.4 * breakup;

        // --- Irregular core (noise-warped, slightly elliptical) ---
        float coreWarp = snoise(vec3(p * 2.0, uTime * 0.01)) * 0.08;
        vec2 coreP = p + coreWarp;
        coreP.x *= 1.3; // slight ellipticity
        float core = exp(-dot(coreP, coreP) * 5.0) * 0.8;

        // --- Radial falloff ---
        float falloff = smoothstep(0.9, 0.05, r);

        // --- Diffuse inter-arm glow ---
        float diffuse = exp(-r * r * 1.5) * 0.08;

        // --- Combine ---
        float brightness = (arms * 0.14 + wisps * 0.06 + core * 0.12 + diffuse) * falloff;

        // Color gradient: core → arm1 → arm2 by radius
        vec3 color = mix(uGalaxyCore * 1.3, uGalaxyArm1, smoothstep(0.0, 0.25, r));
        color = mix(color, uGalaxyArm2, smoothstep(0.25, 0.6, r));

        gl_FragColor = vec4(color * brightness, brightness);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    toneMapped: false,
  });

  const galaxyQuad = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    galaxyMat
  );
  galaxyQuad.position.set(0, 0, -15);
  scene.add(galaxyQuad);

  // ─── 6B1.4b. Nebula Clouds — vivid Hubble-style color regions ────
  function createNebulaCloud(pal) {
    const nebulaMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:   { value: 0 },
        uVivid1: { value: new THREE.Vector3(pal.nebulaVivid1.r, pal.nebulaVivid1.g, pal.nebulaVivid1.b) },
        uVivid2: { value: new THREE.Vector3(pal.nebulaVivid2.r, pal.nebulaVivid2.g, pal.nebulaVivid2.b) },
        uVivid3: { value: new THREE.Vector3(pal.nebulaVivid3.r, pal.nebulaVivid3.g, pal.nebulaVivid3.b) },
        uVivid4: { value: new THREE.Vector3(pal.nebulaVivid4.r, pal.nebulaVivid4.g, pal.nebulaVivid4.b) },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec3 uVivid1;
        uniform vec3 uVivid2;
        uniform vec3 uVivid3;
        uniform vec3 uVivid4;
        varying vec2 vUv;

        ${noiseGLSL}

        // 5-octave FBM with per-octave rotation to prevent grid artifacts
        float fbm(vec3 p) {
          float val = 0.0;
          float amp = 0.5;
          float freq = 1.0;
          // Rotation matrix ~37 degrees to break axis alignment
          mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
          for (int i = 0; i < 5; i++) {
            val += amp * snoise(p * freq);
            p.xy = rot * p.xy;
            p.yz = rot * p.yz;
            freq *= 2.1;
            amp *= 0.5;
          }
          return val;
        }

        void main() {
          vec2 uv = vUv - 0.5; // center coords
          float slowTime = uTime * 0.012;

          // Stage 1: Domain warp — large-scale noise deforms coords for organic shapes
          float warp1 = snoise(vec3(uv * 1.5, slowTime * 0.7)) * 0.35;
          float warp2 = snoise(vec3(uv * 1.5 + 5.0, slowTime * 0.6)) * 0.35;
          vec2 warped = uv + vec2(warp1, warp2);

          // Stage 2: Cloud density via FBM
          float density = fbm(vec3(warped * 2.5, slowTime));
          density = smoothstep(-0.1, 0.8, density); // remap to usable range

          // Stage 3: Region masks — low-frequency patches define color zones
          float region1 = smoothstep(-0.2, 0.4, snoise(vec3(uv * 1.2 + 10.0, slowTime * 0.5)));
          float region2 = smoothstep(-0.2, 0.4, snoise(vec3(uv * 1.3 + 20.0, slowTime * 0.4)));
          float region3 = 1.0 - region1 * 0.5 - region2 * 0.5; // remainder
          // Normalize weights
          float totalW = region1 + region2 + region3 + 0.001;
          region1 /= totalW;
          region2 /= totalW;
          region3 /= totalW;

          // Stage 4: Color blend — vivid colors weighted by region masks
          vec3 nebulaCol = uVivid1 * region1 + uVivid2 * region2 + uVivid3 * region3;

          // Warm-white emission boost in dense cores
          float coreBoost = smoothstep(0.6, 0.9, density);
          nebulaCol = mix(nebulaCol, nebulaCol + vec3(0.15, 0.12, 0.08), coreBoost * 0.5);

          // Stage 5: Dust lanes — higher-frequency FBM darkens and tints with vivid4
          float dust = fbm(vec3(warped * 4.0 + 30.0, slowTime * 0.8));
          dust = smoothstep(0.05, 0.55, dust);
          nebulaCol = mix(nebulaCol, uVivid4, dust * 0.45);
          density *= mix(1.0, 0.3, dust); // darken density in dust lanes

          // Stage 6: Radial vignette + brightness cap
          float vignette = 1.0 - smoothstep(0.25, 0.52, length(uv));
          float alpha = density * vignette * 0.12;
          alpha = clamp(alpha, 0.0, 1.0);

          gl_FragColor = vec4(nebulaCol * alpha, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
      toneMapped: false,
    });

    const nebulaQuad = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      nebulaMat
    );
    nebulaQuad.position.set(0, 0, -14);
    return { quad: nebulaQuad, mat: nebulaMat };
  }

  const nebulaCloud = createNebulaCloud(palette);
  scene.add(nebulaCloud.quad);

  // ─── 6B1.5. Energy Pulse Waves — cosmic heartbeat from atom ────
  const pulseMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uGlowColor: { value: new THREE.Vector3(palette.glowColor.r, palette.glowColor.g, palette.glowColor.b) },
      uRingColor: { value: palette.ringColor },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uGlowColor;
      uniform vec3 uRingColor;
      varying vec2 vUv;
      void main() {
        vec2 center = vec2(0.5);
        float dist = length(vUv - center) * 2.0; // 0 at center, 1 at edge
        float totalAlpha = 0.0;
        vec3 totalColor = vec3(0.0);

        // Single pulse ring — expands over ~4s, then 8s of silence (12s total period)
        float period = 12.0;
        float expandTime = 4.0; // ring takes 4s to expand (same speed as before)
        float raw = mod(uTime, period);
        if (raw < expandTime) {
          float phase = raw / expandTime; // 0→1 during expansion
          float ringPos = phase;
          float ringDist = abs(dist - ringPos);
          float ringWidth = 0.04 + phase * 0.02;
          float ring = smoothstep(ringWidth, 0.0, ringDist);
          float fade = (1.0 - phase) * (1.0 - phase);
          totalAlpha += ring * fade * 0.15;
          totalColor += mix(uGlowColor, uRingColor, phase) * ring * fade * 0.15;
        }

        if (totalAlpha < 0.001) discard;
        gl_FragColor = vec4(totalColor, totalAlpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    toneMapped: false,
  });

  const pulsePlane = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    pulseMat
  );
  scene.add(pulsePlane); // added to scene (not atomGroup) so it doesn't rotate

  // ─── 6B2. Ambient Cosmic Dust — 80 faint drifting particles ────
  function createCosmicDust(palette) {
    const count = 80;
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const opacities = new Float32Array(count);
    const phases = new Float32Array(count);
    const colors = new Float32Array(count * 3);

    const tint = palette.starTint;
    for (let i = 0; i < count; i++) {
      positions[i * 3]     = (Math.random() - 0.5) * 18;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 14;
      positions[i * 3 + 2] = -6 - Math.random() * 6; // -6 to -12
      sizes[i] = 0.08 + Math.random() * 0.15;
      opacities[i] = 0.04 + Math.random() * 0.03;
      phases[i] = Math.random() * Math.PI * 2;
      colors[i * 3]     = tint.r * (0.6 + Math.random() * 0.4);
      colors[i * 3 + 1] = tint.g * (0.6 + Math.random() * 0.4);
      colors[i * 3 + 2] = tint.b * (0.6 + Math.random() * 0.4);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));
    geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float aSize;
        attribute float aOpacity;
        attribute float aPhase;
        varying float vOpacity;
        varying vec3 vColor;
        uniform float uTime;
        void main() {
          vOpacity = aOpacity;
          vColor = color;
          // Gentle sine drift — no CPU update needed
          vec3 pos = position;
          pos.x += sin(uTime * 0.07 + aPhase) * 0.3;
          pos.y += cos(uTime * 0.05 + aPhase * 1.3) * 0.2;
          pos.z += sin(uTime * 0.03 + aPhase * 0.7) * 0.15;
          vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = max(aSize * (500.0 / -mvPos.z), 1.5);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        varying float vOpacity;
        varying vec3 vColor;
        void main() {
          float d = length(gl_PointCoord - vec2(0.5));
          if (d > 0.5) discard;
          // Soft gaussian falloff
          float falloff = exp(-d * d * 12.0);
          gl_FragColor = vec4(vColor * falloff, vOpacity * falloff);
        }
      `,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);
    return { points, mat };
  }

  const cosmicDust = createCosmicDust(palette);

  // ─── 6C. Shooting Stars (Meteors) ──────────────────────────────
  const meteors = [];
  for (let mi = 0; mi < 3; mi++) {
    const meteGeo = new THREE.BufferGeometry();
    const metePos = new Float32Array(6); // 2 vertices × 3
    meteGeo.setAttribute('position', new THREE.BufferAttribute(metePos, 3));
    const meteMat = new THREE.LineBasicMaterial({
      color: palette.meteorColor,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      toneMapped: false,
    });
    const meteLine = new THREE.Line(meteGeo, meteMat);
    scene.add(meteLine);

    meteors.push({
      line: meteLine,
      geo: meteGeo,
      mat: meteMat,
      positions: metePos,
      idle: true,
      timer: 8 + Math.random() * 12,      // idle wait 8-20s
      elapsed: 0,
      duration: 0.4 + Math.random() * 0.3, // streak duration 0.4-0.7s
      startPos: new THREE.Vector3(),
      velocity: new THREE.Vector3(),
    });
  }

  function resetMeteor(m) {
    m.idle = true;
    m.timer = 8 + Math.random() * 12;
    m.elapsed = 0;
    m.duration = 0.4 + Math.random() * 0.3;
    m.mat.opacity = 0;
  }

  function fireMeteor(m) {
    m.idle = false;
    m.elapsed = 0;
    // Random edge start position
    const side = Math.floor(Math.random() * 4);
    const sx = side === 0 ? -8 : side === 1 ? 8 : (Math.random() - 0.5) * 16;
    const sy = side === 2 ? -6 : side === 3 ? 6 : (Math.random() - 0.5) * 12;
    m.startPos.set(sx, sy, -5 - Math.random() * 5);
    // Diagonal velocity toward center-ish
    const angle = Math.atan2(-sy, -sx) + (Math.random() - 0.5) * 0.5;
    const speed = 15 + Math.random() * 10;
    m.velocity.set(Math.cos(angle) * speed, Math.sin(angle) * speed, 0);
  }

  // ─── 6D. Elaborate Comet — rare dramatic comet with curved tail ──
  const COMET_TAIL_VERTS = 50;
  const COMET_TRAIL_COUNT = 30;

  // Tail: Line geometry with decreasing brightness
  const cometTailPositions = new Float32Array(COMET_TAIL_VERTS * 3);
  const cometTailColors = new Float32Array(COMET_TAIL_VERTS * 3);
  const cometTailGeo = new THREE.BufferGeometry();
  cometTailGeo.setAttribute('position', new THREE.BufferAttribute(cometTailPositions, 3));
  cometTailGeo.setAttribute('color', new THREE.BufferAttribute(cometTailColors, 3));
  const cometTailMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false,
  });
  const cometTailLine = new THREE.Line(cometTailGeo, cometTailMat);
  scene.add(cometTailLine);

  // Trail particles: small fading points
  const cometTrailPositions = new Float32Array(COMET_TRAIL_COUNT * 3);
  const cometTrailSizes = new Float32Array(COMET_TRAIL_COUNT);
  const cometTrailOpacities = new Float32Array(COMET_TRAIL_COUNT);
  const cometTrailColors = new Float32Array(COMET_TRAIL_COUNT * 3);
  const cometTrailGeo = new THREE.BufferGeometry();
  cometTrailGeo.setAttribute('position', new THREE.BufferAttribute(cometTrailPositions, 3));
  cometTrailGeo.setAttribute('aSize', new THREE.BufferAttribute(cometTrailSizes, 1));
  cometTrailGeo.setAttribute('aOpacity', new THREE.BufferAttribute(cometTrailOpacities, 1));
  cometTrailGeo.setAttribute('color', new THREE.BufferAttribute(cometTrailColors, 3));

  const cometTrailMat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float aSize;
      attribute float aOpacity;
      varying float vOpacity;
      varying vec3 vColor;
      void main() {
        vOpacity = aOpacity;
        vColor = color;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = max(aSize * (300.0 / -mvPos.z), 1.0);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying float vOpacity;
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if (d > 0.5) discard;
        float falloff = 1.0 - smoothstep(0.0, 0.5, d);
        gl_FragColor = vec4(vColor * falloff, vOpacity * falloff);
      }
    `,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false,
  });
  const cometTrailPoints = new THREE.Points(cometTrailGeo, cometTrailMat);
  scene.add(cometTrailPoints);

  // Head glow: bright point
  const cometHeadGeo = new THREE.BufferGeometry();
  const cometHeadPos = new Float32Array(3);
  const cometHeadSize = new Float32Array([0.15]);
  cometHeadGeo.setAttribute('position', new THREE.BufferAttribute(cometHeadPos, 3));
  cometHeadGeo.setAttribute('aSize', new THREE.BufferAttribute(cometHeadSize, 1));
  const cometHeadMat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float aSize;
      void main() {
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = max(aSize * (600.0 / -mvPos.z), 3.0);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if (d > 0.5) discard;
        float glow = exp(-d * d * 20.0);
        gl_FragColor = vec4(vec3(1.0, 0.98, 0.9) * glow * 2.0, glow);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false,
  });
  const cometHeadPoints = new THREE.Points(cometHeadGeo, cometHeadMat);
  cometHeadPoints.visible = false;
  scene.add(cometHeadPoints);

  // Comet state
  const cometState = {
    active: false,
    timer: 40 + Math.random() * 40, // 40-80s initial wait
    elapsed: 0,
    duration: 3.0, // ~3s travel
    p0: new THREE.Vector3(), // bezier start
    p1: new THREE.Vector3(), // bezier control
    p2: new THREE.Vector3(), // bezier end
    posHistory: [], // ring buffer for tail positions
    trailIndex: 0,
  };
  // Initialize history buffer
  for (let i = 0; i < COMET_TAIL_VERTS; i++) {
    cometState.posHistory.push(new THREE.Vector3(0, 0, -100));
  }

  const mc = palette.meteorColor;

  function fireComet(cs) {
    cs.active = true;
    cs.elapsed = 0;
    cs.duration = 2.5 + Math.random() * 1.5;
    cs.trailIndex = 0;
    // Random edge start
    const edge = Math.random() * 4;
    const z = -4 - Math.random() * 4;
    if (edge < 1) cs.p0.set(-9, (Math.random() - 0.5) * 8, z);
    else if (edge < 2) cs.p0.set(9, (Math.random() - 0.5) * 8, z);
    else if (edge < 3) cs.p0.set((Math.random() - 0.5) * 12, 7, z);
    else cs.p0.set((Math.random() - 0.5) * 12, -7, z);
    // Opposite edge end
    cs.p2.set(-cs.p0.x * (0.5 + Math.random() * 0.5), -cs.p0.y * (0.5 + Math.random() * 0.5), z);
    // Control point for curve — offset perpendicular
    cs.p1.set(
      (cs.p0.x + cs.p2.x) * 0.5 + (Math.random() - 0.5) * 6,
      (cs.p0.y + cs.p2.y) * 0.5 + (Math.random() - 0.5) * 4,
      z
    );
    // Reset history
    for (let i = 0; i < COMET_TAIL_VERTS; i++) {
      cs.posHistory[i].copy(cs.p0);
    }
    // Reset trail
    for (let i = 0; i < COMET_TRAIL_COUNT; i++) {
      cometTrailOpacities[i] = 0;
    }
    cometHeadPoints.visible = true;
    cometTailMat.opacity = 1;
  }

  // Flare state machine
  const flareState = {
    active: false,
    timer: 15 + Math.random() * 15,
    elapsed: 0,
    duration: 0,
    seed: 0,
  };

  // Return everything needed for animation
  return {
    scene, camera, renderer, composer,
    atomGroup, energyMat,
    sparkPoints, sparkPositions, sparkVelocities, sparkLifetimes, sparkMaxLifetimes, sparkColors, sparkSizes, sc,
    ringMeshes, ringMaterials,
    orbitParticleGroups,
    starLayers, bgGalaxies, cosmicDust, pulseMat, pulsePlane,
    galaxyQuad, galaxyMat, nebulaCloud, meteors, resetMeteor, fireMeteor,
    flareState,
    cometState, cometTailLine, cometTailGeo, cometTailPositions, cometTailColors, cometTailMat,
    cometTrailPoints, cometTrailGeo, cometTrailPositions, cometTrailSizes, cometTrailOpacities, cometTrailColors,
    cometHeadPoints, cometHeadPos, cometHeadGeo,
    fireComet, mc, COMET_TAIL_VERTS, COMET_TRAIL_COUNT,
  };
}

// ─── Mouse (shared) ──────────────────────────────────────────────────
const mouse = new THREE.Vector2(0, 0);
const targetMouse = new THREE.Vector2(0, 0);
window.addEventListener('mousemove', e => {
  targetMouse.x = (e.clientX / innerWidth) * 2 - 1;
  targetMouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// ─── Create Both Scenes (only one active at a time) ─────────────────
const greenSection = document.getElementById('hero-green');
const sunsetSection = document.getElementById('hero-sunset');
const greenScene = createScene(greenSection, palettes.deepGreen);
const sunsetScene = createScene(sunsetSection, palettes.warmSunset);
let activeScene = greenScene;
const allScenes = [activeScene];

// ─── Palette Toggle ─────────────────────────────────────────────────
const toggleBtn = document.getElementById('palette-toggle');
toggleBtn.addEventListener('click', () => {
  if (activeScene === greenScene) {
    activeScene = sunsetScene;
    greenSection.style.display = 'none';
    sunsetSection.style.display = '';
    toggleBtn.textContent = 'Switch to Green';
  } else {
    activeScene = greenScene;
    sunsetSection.style.display = 'none';
    greenSection.style.display = '';
    toggleBtn.textContent = 'Switch to Sunset';
  }
  allScenes[0] = activeScene;
  // Update size in case of resize while hidden
  activeScene.camera.aspect = innerWidth / innerHeight;
  activeScene.camera.updateProjectionMatrix();
  activeScene.renderer.setSize(innerWidth, innerHeight);
  activeScene.composer.setSize(innerWidth, innerHeight);
});

// ─── Animation Loop ──────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta() || 0.016;

  // Smooth mouse lerp
  mouse.lerp(targetMouse, 0.04);

  for (const s of allScenes) {
    // Auto-rotation (Y only — keeps rings circular, no elliptical perspective)
    s.atomGroup.rotation.y = t * 0.08 + mouse.x * 0.15;
    s.atomGroup.rotation.x = 0;
    s.atomGroup.position.y = 0;

    // Nucleus breathing — subtle scale pulse
    const breathe = 1.0 + 0.05 * Math.sin(t * 0.67 * Math.PI * 2);
    s.atomGroup.children[0].scale.setScalar(breathe); // energySphere
    s.atomGroup.children[1].scale.setScalar(breathe); // outerGlow

    // Energy shader time
    s.energyMat.uniforms.uTime.value = t % 1000.0;
    s.pulseMat.uniforms.uTime.value = t % 1000.0;
    // Keep pulse plane at atom center, always facing camera (billboard)
    s.atomGroup.updateMatrixWorld();
    s.pulsePlane.position.setFromMatrixPosition(s.atomGroup.matrixWorld);
    s.pulsePlane.quaternion.copy(s.camera.quaternion);

    // Update ring shader times (no oscillation — keeps clean atom silhouette)
    for (let i = 0; i < s.ringMaterials.length; i++) {
      s.ringMaterials[i].uniforms.uTime.value = t % 1000.0;
    }

    // Orbit particles along curves — also oscillate their rotation
    for (const group of s.orbitParticleGroups) {
      const posAttr = group.points.geometry.attributes.position;
      for (let i = 0; i < group.phases.length; i++) {
        const param = (group.phases[i] + t * group.speed) % 1;
        const pt = group.curve.getPointAt(param);
        posAttr.setXYZ(i, pt.x, pt.y, pt.z);
      }
      posAttr.needsUpdate = true;
    }

    // Update spark particles
    const sparkPosAttr = s.sparkPoints.geometry.attributes.position;
    const sparkColAttr = s.sparkPoints.geometry.attributes.color;
    const sparkSizeAttr = s.sparkPoints.geometry.attributes.aSize;
    const sparkOpacityAttr = s.sparkPoints.geometry.attributes.aOpacity;
    for (let i = 0; i < s.sparkLifetimes.length; i++) {
      s.sparkLifetimes[i] += 0.016;

      if (s.sparkLifetimes[i] >= s.sparkMaxLifetimes[i]) {
        s.sparkLifetimes[i] = 0;
        s.sparkMaxLifetimes[i] = 0.8 + Math.random() * 1.7;
        s.sparkPositions[i * 3] = 0;
        s.sparkPositions[i * 3 + 1] = 0;
        s.sparkPositions[i * 3 + 2] = 0;
        s.sparkSizes[i] = 0.012 + Math.random() * 0.016;

        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const speed = 0.2 + Math.random() * 0.6;
        s.sparkVelocities[i].set(
          Math.sin(phi) * Math.cos(theta) * speed,
          Math.sin(phi) * Math.sin(theta) * speed,
          Math.cos(phi) * speed
        );
      }

      const vel = s.sparkVelocities[i];
      s.sparkPositions[i * 3]     += vel.x * 0.016;
      s.sparkPositions[i * 3 + 1] += vel.y * 0.016;
      s.sparkPositions[i * 3 + 2] += vel.z * 0.016;

      // Cubic fade for smoother tail
      const lifeRatio = 1.0 - (s.sparkLifetimes[i] / s.sparkMaxLifetimes[i]);
      const fade = lifeRatio * lifeRatio * lifeRatio;
      const brightness = (0.8 + Math.random() * 0.4) * fade;
      s.sparkColors[i * 3]     = s.sc.r * brightness;
      s.sparkColors[i * 3 + 1] = s.sc.g * brightness;
      s.sparkColors[i * 3 + 2] = s.sc.b * brightness;
      sparkOpacityAttr.array[i] = fade;
    }
    sparkPosAttr.needsUpdate = true;
    sparkColAttr.needsUpdate = true;
    sparkSizeAttr.needsUpdate = true;
    sparkOpacityAttr.needsUpdate = true;

    // Star field layers — rotation for parallax + time + mouse offset
    for (let li = 0; li < s.starLayers.length; li++) {
      const layer = s.starLayers[li];
      layer.mat.uniforms.uTime.value = t % 1000.0;
      // rotation disabled — sub-pixel movement causes visible flickering
      // layer.points.rotation.y = t * layer.points.userData.rotSpeed;
      // Depth-based mouse parallax (far layers move less)
      const depth = (li + 1) / s.starLayers.length;
      layer.points.position.x = mouse.x * 0.05 * depth;
      layer.points.position.y = mouse.y * 0.05 * depth;
    }

    // Background galaxies — deepest parallax layer
    s.bgGalaxies.mat.uniforms.uTime.value = t % 1000.0;
    s.bgGalaxies.points.position.x = mouse.x * 0.03;
    s.bgGalaxies.points.position.y = mouse.y * 0.03;

    // Cosmic dust — mid-depth parallax
    s.cosmicDust.mat.uniforms.uTime.value = t % 1000.0;
    s.cosmicDust.points.position.x = mouse.x * 0.08;
    s.cosmicDust.points.position.y = mouse.y * 0.08;

    // Flare state machine — occasional bright star surges
    const fs = s.flareState;
    if (!fs.active) {
      fs.timer -= dt;
      if (fs.timer <= 0) {
        fs.active = true;
        fs.elapsed = 0;
        fs.duration = 1.5 + Math.random() * 2.0; // 1.5-3.5s
        fs.seed = Math.random() * 1000;
      }
    }
    if (fs.active) {
      fs.elapsed += dt;
      const progress = fs.elapsed / fs.duration;
      if (progress >= 1.0) {
        fs.active = false;
        fs.timer = 10 + Math.random() * 20; // 10-30s between flares
        // Zero out flare intensity
        const featureMat = s.starLayers[2].mat;
        if (featureMat.uniforms.uFlareIntensity) {
          featureMat.uniforms.uFlareIntensity.value = 0;
        }
      } else {
        // Fast linear rise (first 20%), exponential decay (remaining 80%)
        let intensity;
        if (progress < 0.2) {
          intensity = progress / 0.2;
        } else {
          intensity = Math.exp(-(progress - 0.2) * 3.0);
        }
        const featureMat = s.starLayers[2].mat;
        if (featureMat.uniforms.uFlareIntensity) {
          featureMat.uniforms.uFlareIntensity.value = intensity;
          featureMat.uniforms.uFlareSeed.value = fs.seed;
        }
      }
    }

    // Galaxy shader — update time, move quad for subtle parallax
    s.galaxyMat.uniforms.uTime.value = t % 10000.0;
    s.galaxyQuad.position.x = mouse.x * 0.15;
    s.galaxyQuad.position.y = mouse.y * 0.15;

    // Nebula clouds — update time, parallax between galaxy and stars
    s.nebulaCloud.mat.uniforms.uTime.value = t % 10000.0;
    s.nebulaCloud.quad.position.x = mouse.x * 0.12;
    s.nebulaCloud.quad.position.y = mouse.y * 0.12;

    // Shooting stars
    for (const m of s.meteors) {
      if (m.idle) {
        m.timer -= 0.016;
        if (m.timer <= 0) s.fireMeteor(m);
      } else {
        m.elapsed += 0.016;
        const progress = m.elapsed / m.duration;
        if (progress >= 1.0) {
          s.resetMeteor(m);
        } else {
          // Position: head and tail
          const headX = m.startPos.x + m.velocity.x * m.elapsed;
          const headY = m.startPos.y + m.velocity.y * m.elapsed;
          const tailLen = 0.06;
          const tailX = headX - m.velocity.x * tailLen;
          const tailY = headY - m.velocity.y * tailLen;
          m.positions[0] = tailX; m.positions[1] = tailY; m.positions[2] = m.startPos.z;
          m.positions[3] = headX; m.positions[4] = headY; m.positions[5] = m.startPos.z;
          m.geo.attributes.position.needsUpdate = true;
          // Fade in/out
          const fadeIn = Math.min(progress * 5.0, 1.0);
          const fadeOut = 1.0 - Math.max((progress - 0.7) / 0.3, 0.0);
          m.mat.opacity = fadeIn * fadeOut * 0.8;
        }
      }
    }

    // Elaborate comet — rare dramatic comet with curved tail
    const cs = s.cometState;
    if (!cs.active) {
      cs.timer -= dt;
      if (cs.timer <= 0) {
        s.fireComet(cs);
      }
    }
    if (cs.active) {
      cs.elapsed += dt;
      const progress = cs.elapsed / cs.duration;
      if (progress >= 1.0) {
        cs.active = false;
        cs.timer = 40 + Math.random() * 40;
        s.cometHeadPoints.visible = false;
        s.cometTailMat.opacity = 0;
        // Clear trail
        for (let i = 0; i < s.COMET_TRAIL_COUNT; i++) {
          s.cometTrailOpacities[i] = 0;
        }
        s.cometTrailGeo.attributes.aOpacity.needsUpdate = true;
      } else {
        // Quadratic bezier interpolation
        const it = progress;
        const omt = 1.0 - it;
        const headX = omt * omt * cs.p0.x + 2 * omt * it * cs.p1.x + it * it * cs.p2.x;
        const headY = omt * omt * cs.p0.y + 2 * omt * it * cs.p1.y + it * it * cs.p2.y;
        const headZ = cs.p0.z;

        // Update head position
        s.cometHeadPos[0] = headX;
        s.cometHeadPos[1] = headY;
        s.cometHeadPos[2] = headZ;
        s.cometHeadGeo.attributes.position.needsUpdate = true;

        // Shift position history (ring buffer style)
        for (let i = s.COMET_TAIL_VERTS - 1; i > 0; i--) {
          cs.posHistory[i].copy(cs.posHistory[i - 1]);
        }
        cs.posHistory[0].set(headX, headY, headZ);

        // Update tail vertices from history
        const fadeIn = Math.min(progress * 4.0, 1.0);
        const fadeOut = 1.0 - Math.max((progress - 0.7) / 0.3, 0.0);
        const cometAlpha = fadeIn * fadeOut;
        s.cometTailMat.opacity = cometAlpha;

        for (let i = 0; i < s.COMET_TAIL_VERTS; i++) {
          const p = cs.posHistory[i];
          s.cometTailPositions[i * 3]     = p.x;
          s.cometTailPositions[i * 3 + 1] = p.y;
          s.cometTailPositions[i * 3 + 2] = p.z;
          // Brightness decreases along tail
          const tailFade = 1.0 - (i / s.COMET_TAIL_VERTS);
          const bf = tailFade * tailFade * cometAlpha;
          // Blend from white-hot head to palette meteor color
          const headMix = tailFade * tailFade;
          s.cometTailColors[i * 3]     = (1.0 * headMix + s.mc.r * (1 - headMix)) * bf;
          s.cometTailColors[i * 3 + 1] = (0.98 * headMix + s.mc.g * (1 - headMix)) * bf;
          s.cometTailColors[i * 3 + 2] = (0.9 * headMix + s.mc.b * (1 - headMix)) * bf;
        }
        s.cometTailGeo.attributes.position.needsUpdate = true;
        s.cometTailGeo.attributes.color.needsUpdate = true;

        // Trail particles — spawn at head, fade over time
        const ti = cs.trailIndex % s.COMET_TRAIL_COUNT;
        s.cometTrailPositions[ti * 3]     = headX + (Math.random() - 0.5) * 0.15;
        s.cometTrailPositions[ti * 3 + 1] = headY + (Math.random() - 0.5) * 0.15;
        s.cometTrailPositions[ti * 3 + 2] = headZ;
        s.cometTrailSizes[ti] = 0.02 + Math.random() * 0.03;
        s.cometTrailOpacities[ti] = 0.6 * cometAlpha;
        s.cometTrailColors[ti * 3]     = s.mc.r * 0.8;
        s.cometTrailColors[ti * 3 + 1] = s.mc.g * 0.8;
        s.cometTrailColors[ti * 3 + 2] = s.mc.b * 0.8;
        cs.trailIndex++;

        // Fade all trail particles
        for (let i = 0; i < s.COMET_TRAIL_COUNT; i++) {
          s.cometTrailOpacities[i] *= 0.95;
        }
        s.cometTrailGeo.attributes.position.needsUpdate = true;
        s.cometTrailGeo.attributes.aSize.needsUpdate = true;
        s.cometTrailGeo.attributes.aOpacity.needsUpdate = true;
        s.cometTrailGeo.attributes.color.needsUpdate = true;
      }
    }

    // Render
    s.composer.render();
  }
}

animate();

// ─── Resize ──────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  for (const s of allScenes) {
    s.camera.aspect = innerWidth / innerHeight;
    s.camera.updateProjectionMatrix();
    s.renderer.setSize(innerWidth, innerHeight);
    s.composer.setSize(innerWidth, innerHeight);
  }
});
</script>
</body>
</html>
