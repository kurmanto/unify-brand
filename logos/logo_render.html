<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Render</title></head>
<body style="margin:0;padding:0;background:transparent;">

<!-- 104x104 main logo for email signature (displays at 52x52 retina) -->
<div id="main" style="width:104px;height:104px;position:absolute;top:0;left:0;">
  <svg width="104" height="104" viewBox="0 0 104 104" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg1" x1="0" y1="0" x2="62" y2="104" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#6d1f3e"/>
        <stop offset="50%" stop-color="#b83a48"/>
        <stop offset="100%" stop-color="#e07a4b"/>
      </linearGradient>
    </defs>
    <rect width="104" height="104" rx="26" fill="url(#bg1)"/>
    <g transform="translate(52,52) scale(1.08) translate(-22,-22)">
      <circle cx="11" cy="8" r="3" fill="rgba(255,255,255,0.4)"/>
      <line x1="11" y1="11" x2="11" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M11 22 Q11 30 22 33" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="33" cy="8" r="3" fill="white"/>
      <line x1="33" y1="11" x2="33" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M33 22 Q33 30 22 33" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="22" cy="36" r="3.5" fill="white"/>
    </g>
  </svg>
</div>

<!-- 52x52 lockup logo for email signature (displays at 26x26 retina) -->
<div id="lockup" style="width:52px;height:52px;position:absolute;top:120px;left:0;">
  <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg2" x1="0" y1="0" x2="31" y2="52" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#6d1f3e"/>
        <stop offset="50%" stop-color="#b83a48"/>
        <stop offset="100%" stop-color="#e07a4b"/>
      </linearGradient>
    </defs>
    <rect width="52" height="52" rx="12" fill="url(#bg2)"/>
    <g transform="translate(26,26) scale(0.58) translate(-22,-22)">
      <circle cx="11" cy="8" r="3.5" fill="rgba(255,255,255,0.4)"/>
      <line x1="11" y1="11.5" x2="11" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
      <path d="M11 22 Q11 30 22 33" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="33" cy="8" r="3.5" fill="white"/>
      <line x1="33" y1="11.5" x2="33" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M33 22 Q33 30 22 33" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="22" cy="36" r="4" fill="white"/>
    </g>
  </svg>
</div>

</body>
</html>
